name: Build release APK

on:
  push:
    tags:
      - 'release-*'

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_NDK_VERSION: r21e
      ANDROID_SDK_TOOLS_VERSION: '25.2.5'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ant autoconf automake libtool wget unzip patch

      - name: Install legacy Android SDK tools (with ant build rules)
        run: |
          mkdir -p "$HOME/android-sdk"
          cd "$HOME/android-sdk"
          wget -q "https://dl.google.com/android/repository/tools_r${ANDROID_SDK_TOOLS_VERSION}-linux.zip" -O tools.zip
          unzip -q tools.zip
          rm tools.zip
          yes | ./tools/bin/sdkmanager --verbose "platforms;android-24" "build-tools;25.0.3" "platform-tools" > /dev/null
          echo "ANDROID_HOME=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "$HOME/android-sdk/platform-tools" >> "$GITHUB_PATH"
          echo "$HOME/android-sdk/tools" >> "$GITHUB_PATH"

      - name: Install Android NDK
        run: |
          cd "$HOME"
          wget -q "https://dl.google.com/android/repository/android-ndk-${ANDROID_NDK_VERSION}-linux-x86_64.zip" -O ndk.zip
          unzip -q ndk.zip
          rm ndk.zip
          echo "ANDROID_NDK=$HOME/android-ndk-${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Build release APK
        run: ./build.sh release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flite-tts-${{ github.ref_name }}
          path: bin/*.apk
          if-no-files-found: error
